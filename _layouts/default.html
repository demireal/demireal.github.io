<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="{{ '/' | relative_url }}" class="nav__name">home</a>
      <div class="nav__links">
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle theme">
          <i class="fas fa-sun" id="theme-icon"></i>
        </button>
        <a href="{{ '/publications/' | relative_url }}" class="nav__link {% if page.url == '/publications/' %}nav__link--active{% endif %}">publications</a>
        <a href="{{ '/teaching/' | relative_url }}" class="nav__link {% if page.url == '/teaching/' %}nav__link--active{% endif %}">teaching</a>
        <a href="{{ '/cv/' | relative_url }}" class="nav__link {% if page.url == '/cv/' %}nav__link--active{% endif %}">cv</a>
      </div>
    </div>
  </nav>

  <main class="main">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer__inner">
      &copy; {{ site.time | date: '%Y' }} ilker demirel &middot; last updated {{ site.time | date: '%b %Y' }}
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-hidden="true">
    <img class="lightbox__img" id="lightbox-img" src="" alt="">
  </div>

  <script>
  (function() {
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');

    window.openLightbox = function(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt || '';
      lb.classList.add('lightbox--open');
      lb.setAttribute('aria-hidden', 'false');
    };

    lb.addEventListener('click', function(e) {
      if (e.target !== lbImg) {
        lb.classList.remove('lightbox--open');
        lb.setAttribute('aria-hidden', 'true');
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lb.classList.contains('lightbox--open')) {
        lb.classList.remove('lightbox--open');
        lb.setAttribute('aria-hidden', 'true');
      }
    });

    // Theme toggle (respects stored preference, then browser preference, then dark)
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var stored = localStorage.getItem('theme');
      var preferLight = stored === 'light' || (!stored && window.matchMedia('(prefers-color-scheme: light)').matches);
      if (preferLight) {
        document.documentElement.classList.add('light');
        icon.className = 'fas fa-moon';
      }
      toggle.addEventListener('click', function() {
        var isLight = document.documentElement.classList.toggle('light');
        icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      });
    })();

    // Open all external links in new tabs
    document.querySelectorAll('.main a[href]').forEach(function(a) {
      if (a.hostname && a.hostname !== location.hostname) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener');
      }
    });
  })();
  </script>

</body>
</html>
